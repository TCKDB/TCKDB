<!--
  Sanitized fixture matching the LIVE shape of CCCBDB's
  expdiatomicsx.asp ("Experimental Diatomic Data") flat table.

  Crucially, the live page emits NO ``<th>`` header row — every row is
  plain ``<td>``. The parser would otherwise treat the first H2 data
  row as the column header (the Phase 5d dry-run dropped this bug
  into ``payloads_dryrun/diatomic_spectroscopic.json``). The parser
  config now declares ``configured_column_names`` for this table so
  parsing works against the real page shape; this fixture mirrors
  that shape.

  Source page (informational only — NOT fetched by tests):
    https://cccbdb.nist.gov/expdiatomicsx.asp

  Column meanings: positions 0-2 and 8 are confidently Molecule, name,
  ωe (cm^-1), and reference squib. Positions 3-7 are spectroscopic
  constants whose exact mapping isn't column-keyed on the live page;
  the configured names ``wexe / weye / Be / alpha_e / re`` are stable
  lookup tokens, not authoritative labels.

  Values are real-but-rounded; do not cite from this fixture.

  H2+ is included so a test can pin row-1 parsing as a regression
  against the original bug (where row 0 was eaten by header inference
  and row 1 became row 0 with garbage column keys).
-->

# TCKDB backend — conda/mamba environment recipe.
#
# Create the env on a new machine with:
#   mamba env create -n tckdb_env -f backend/environment.yml
#   # or, equivalent:
#   conda env create -n tckdb_env -f backend/environment.yml
#   # or, for slim containers:
#   micromamba create -n tckdb_env -f backend/environment.yml
#
# Activate with:
#   conda activate tckdb_env
#
# ----------------------------------------------------------------------------
# Relationship to backend/pyproject.toml
# ----------------------------------------------------------------------------
# This file is the recommended path for developer workstations because
# it installs RDKit from conda-forge — historically the smoothest
# RDKit build for the chemistry stack TCKDB uses.
#
# Authoritative package metadata for the backend itself lives in
# `backend/pyproject.toml`. That file defines the `tckdb-backend`
# package, its runtime deps, dev/test extras (`[dev]`), and an optional
# pip-RDKit extra (`[rdkit]`) for pure-pip / containerized setups where
# conda is not available. A `uv.lock` next to it pins exact versions.
#
# Recommended developer workflow (conda + pip):
#   mamba env create -n tckdb_env -f backend/environment.yml
#   conda activate tckdb_env
#   cd backend
#   pip install -e ".[dev]"     # skip the [rdkit] extra — conda has it
#
# Recommended container / pure-pip workflow:
#   cd backend
#   uv sync --extra dev --extra rdkit
#     # or: pip install -e ".[dev,rdkit]"
#
# Scope of THIS file: runtime dependencies for the FastAPI app, Alembic
# migrations, and helper scripts. Test / dev / lint tools (pytest,
# pytest-cov, httpx, ruff) come from the `[dev]` extra in pyproject.toml.

name: tckdb_env

channels:
  - conda-forge

# ----------------------------------------------------------------------------
# Version pinning policy
# ----------------------------------------------------------------------------
# Direct dependencies are pinned to exact versions so a fresh env (CI, a new
# workstation, the multi-arch Docker image) resolves the SAME stack every time,
# and upgrades are a deliberate, reviewed change instead of a surprise from an
# unpinned solve. Unpinned drift broke CI twice: a FastAPI/Starlette bump
# changed `request.scope["route"].path` semantics, and an `rdkit-stubs` release
# shipped a syntactically-broken `.pyi`. To upgrade a package: bump its version
# here, run the tests, and commit. conda pins are version-only (build hashes
# still float), so they stay portable across linux-64 (CI) and linux-aarch64
# (the Raspberry Pi / arm64 image). `python` is intentionally left at the minor
# (3.13) so patch/security updates flow without a manual bump.

dependencies:
  - python=3.13

  # Web framework + ASGI server. `uvicorn-standard` pulls in
  # httptools / uvloop / websockets / watchfiles. `starlette` is pinned
  # explicitly (fastapi depends on it) because a minor bump changed
  # `request.scope["route"].path` semantics and broke idempotency scoping.
  - fastapi=0.135.1
  - starlette=0.52.1
  - uvicorn-standard=0.42.0

  # ORM + driver + migrations. `psycopg-c` is the optional C accelerator
  # used by `psycopg` v3 when available.
  - sqlalchemy=2.0.46
  - psycopg=3.3.3
  - psycopg-c=3.3.3
  - alembic=1.18.4

  # Validation / settings.
  - pydantic=2.12.5
  - pydantic-settings=2.13.1
  - python-dotenv=1.2.1

  # Chemistry.
  - rdkit=2025.9.6
  - numpy=2.4.2

  # Interoperability: Cantera validates exported CHEMKIN mechanisms
  # (`app/services/scientific_read/chemkin_serialize.validate_chemkin_mechanism`
  # runs ck2yaml + a strict Solution load, the ground-truth check that a
  # downstream interpreter will accept the file). Imported lazily, so it is an
  # optional runtime dependency; it is required by the CHEMKIN export-validation
  # tests. Conda-forge is the reliable source for Cantera.
  - cantera=3.2.0

  # Artifact storage (MinIO / S3) and outbound HTTP (literature lookup).
  - boto3=1.42.76
  - requests=2.32.5

  # YAML I/O (ARC output.yml ingest, config).
  - pyyaml=6.0.3

  # pip-only deps (not packaged on conda-forge).
  - pip
  - pip:
      # Drop-in replacement for the abandoned `isbnlib`; the runtime
      # import path remains `import isbnlib`.
      - isbnlib2==3.11.9

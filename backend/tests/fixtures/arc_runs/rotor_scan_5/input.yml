project: rxn_30
job_types:
  rotors: true
  irc: false
  fine: true
  sp: true
compute_thermo: true
bac_type: null
skip_nmd: false
allow_nonisomorphic_2d: false
species:
- label: rxn_30_CC(C)C=O
  smiles: CC(C)C=O
- label: rxn_30_[H]
  smiles: '[H]'
- label: rxn_30_C[C](C)C=O
  smiles: C[C](C)C=O
- label: rxn_30_[H][H]
  smiles: '[H][H]'
reactions:
- label: rxn_30_CC(C)C=O + rxn_30_[H] <=> rxn_30_C[C](C)C=O + rxn_30_[H][H]
opt_level:
  method: wb97xd
  basis: def2tzvp
freq_level:
  method: wb97xd
  basis: def2tzvp
sp_level:
  method: DLPNO-CCSD(T)-F12
  basis: cc-pVTZ-F12
  auxiliary_basis: aug-cc-pVTZ/C
  cabs: cc-pVTZ-F12-CABS
  software: orca
  args:
    keyword:
      dlpno_threshold: TightPNO
      rijcosx: RIJCOSX
      grid: DEFGRID3
      uno: UNO
tckdb:
  enabled: true
  base_url: "http://127.0.0.1:8000/api/v1"
  api_key_env: "TCKDB_API_KEY"
  payload_dir: "tckdb_payloads"
  upload: true
  strict: false
  timeout_seconds: 30
  upload_mode: "computed_reaction"
  artifacts:
      upload: true
      kinds: ["output_log", "input"]
      max_size_mb: 50

project: rxn_188
job_types:
  rotors: true
  irc: false
  fine: true
  sp: true
compute_thermo: true
bac_type: null
skip_nmd: false
allow_nonisomorphic_2d: false
species:
- label: rxn_188_C
  smiles: C
- label: rxn_188_[OH]
  smiles: '[OH]'
- label: rxn_188_[CH3]
  smiles: '[CH3]'
- label: rxn_188_O
  smiles: O
reactions:
- label: rxn_188_C + rxn_188_[OH] <=> rxn_188_[CH3] + rxn_188_O
opt_level:
  method: wb97xd
  basis: def2tzvp
freq_level:
  method: wb97xd
  basis: def2tzvp
sp_level:
  method: DLPNO-CCSD(T)-F12
  basis: cc-pVTZ-F12
  auxiliary_basis: aug-cc-pVTZ/C
  cabs: cc-pVTZ-F12-CABS
  software: orca
  args:
    keyword:
      dlpno_threshold: TightPNO
      rijcosx: RIJCOSX
      grid: DEFGRID3
      uno: UNO
tckdb:
  enabled: true
  base_url: "http://127.0.0.1:8000/api/v1"
  api_key_env: "TCKDB_API_KEY"
  payload_dir: "tckdb_payloads"
  upload: true
  strict: false
  timeout_seconds: 30
  upload_mode: "computed_reaction"
  artifacts:
      upload: true
      kinds: ["output_log", "input"]
      max_size_mb: 50

project: rxn_298
job_types:
  rotors: true
  irc: false
  fine: true
  sp: true
compute_thermo: true
bac_type: null
skip_nmd: false
allow_nonisomorphic_2d: false
species:
- label: rxn_298_[O]O
  smiles: '[O]O'
- label: rxn_298_CC(C)C
  smiles: CC(C)C
- label: rxn_298_OO
  smiles: OO
- label: rxn_298_C[C](C)C
  smiles: C[C](C)C
reactions:
- label: rxn_298_[O]O + rxn_298_CC(C)C <=> rxn_298_OO + rxn_298_C[C](C)C
opt_level:
  method: wb97xd
  basis: def2tzvp
freq_level:
  method: wb97xd
  basis: def2tzvp
sp_level:
  method: DLPNO-CCSD(T)-F12
  basis: cc-pVTZ-F12
  auxiliary_basis: aug-cc-pVTZ/C
  cabs: cc-pVTZ-F12-CABS
  software: orca
  args:
    keyword:
      dlpno_threshold: TightPNO
      rijcosx: RIJCOSX
      grid: DEFGRID3
      uno: UNO
tckdb:
  enabled: true
  base_url: "http://127.0.0.1:8000/api/v1"
  api_key_env: "TCKDB_API_KEY"
  payload_dir: "tckdb_payloads"
  upload: true
  strict: false
  timeout_seconds: 30
  upload_mode: "computed_reaction"
  artifacts:
      upload: true
      kinds: ["output_log", "input"]
      max_size_mb: 50

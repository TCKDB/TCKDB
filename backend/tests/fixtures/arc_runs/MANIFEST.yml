# ARC run fixtures — provenance of each extracted scenario.
#
# Each entry records WHERE the scenario came from on the original contributor's
# machine. Source ARC run directories are NOT in this repo (calcs/ alone is
# multi-GB per run). When fixtures need regeneration after a TCKDB upload-
# schema change, point scripts/regenerate_arc_fixtures.py at these paths.
#
# Extracted layout per scenario:
#   <scenario>/
#     output.yml          ARC scientific summary (reference only)
#     input.yml           ARC project config (reference only, may be absent)
#     tckdb_payloads/     pre-generated upload payloads + meta files
#
# Source-of-truth identifiers:
#   source_path        absolute path on contributor's machine when copied
#   arc_version        ARC release at the time the run completed
#   arc_git_commit     full ARC commit hash from output.yml
#   project            ARC project name from output.yml
#   reaction_family    primary reaction family for the run
#   feature_focus      what this scenario stresses in the upload path


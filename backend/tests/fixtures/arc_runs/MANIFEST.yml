# Cross-scenario species overlap — load-bearing for conformer consolidation
# testing. The same chemical species computed by independent ARC runs should
# share a single conformer_group with multiple conformer_observations.
species_overlap:
  "[CH3]":   [reaction_1, rotor_scan_1, rotor_scan_2, rotor_scan_7]
  "C":       [reaction_1, rotor_scan_1, rotor_scan_2, rotor_scan_7]   # methane
  "[H]":     [rotor_scan_3, rotor_scan_5, rotor_scan_8]
  "[H][H]":  [rotor_scan_3, rotor_scan_5, rotor_scan_8]
  "[OH]":    [scan_1, rotor_scan_1, rotor_scan_10]
  "CCCC":    [scan_1, rotor_scan_10]                                   # n-butane
  "[CH2]CCC":[scan_1, rotor_scan_10]                                   # n-butyl
  "[CH](C)C":[neb_1, rotor_scan_9]                                     # iso-propyl
  "[O]":     [scan_1, rotor_scan_10]

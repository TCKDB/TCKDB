# ============================================================================
# TCKDB — Local v0 deployment
#
# Reference Docker Compose stack for running TCKDB privately on a single
# machine.  This file is intentionally narrow in scope: it provisions the
# infrastructure services (PostgreSQL+RDKit, MinIO) that are awkward to
# install natively, while the FastAPI backend and upload worker run on the
# host inside the project's conda environment.
#
# Why the split?
#   - The DB image bundles the RDKit cartridge; reproducing that natively
#     is painful and version-sensitive.
#   - MinIO is a single static binary that's trivial to containerize.
#   - The Python backend depends on a conda env (``tckdb_env``) that is
#     managed by the developer.  Building a backend image is tracked as
#     future work — see ``docs/deployment/local-v0.md`` (Future work).
#
# Usage:
#   cp .env.local.example .env
#   docker compose -f docker-compose.local.yml up -d
#   conda run -n tckdb_env alembic upgrade head
#   conda run -n tckdb_env python scripts/bootstrap_admin.py --username admin ...
#   conda run -n tckdb_env uvicorn main:app --host 127.0.0.1 --port 8000
#
# Networking:
#   Uses ``network_mode: host`` so the host-side API and worker can talk
#   to the DB on 127.0.0.1:5432 with the default settings in
#   ``app/api/config.py``.  This matches ``docker-compose.yml``.
# ============================================================================

services:
  db:
    image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
    environment:
      POSTGRES_USER: ${DB_USER:-tckdb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tckdb}
      POSTGRES_DB: ${DB_NAME:-tckdb_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    network_mode: host
    volumes:
      - tckdb_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tckdb} -d ${DB_NAME:-tckdb_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-tckdb}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-tckdb_secret}
    volumes:
      - tckdb_local_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  tckdb_local_pgdata:
  tckdb_local_minio:

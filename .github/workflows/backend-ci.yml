name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Makefile"
      - "docker-compose.yml"
      - "backend/**"
      - "schemas/python/tckdb-schemas/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Makefile"
      - "docker-compose.yml"
      - "backend/**"
      - "schemas/python/tckdb-schemas/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - gate: api
            name: Backend API gate
          - gate: scientific
            name: Scientific read and service gate

    services:
      postgres:
        image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
        env:
          POSTGRES_USER: tckdb
          POSTGRES_PASSWORD: tckdb
          POSTGRES_DB: tckdb_${{ matrix.gate }}_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tckdb -d tckdb_${{ matrix.gate }}_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        command: server /data --address ":9000"
        env:
          MINIO_ROOT_USER: tckdb
          MINIO_ROOT_PASSWORD: tckdb_secret
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: tckdb
      DB_PASSWORD: tckdb
      DB_NAME: tckdb_${{ matrix.gate }}_ci
      DB_CLIENT_ENCODING: utf8
      DB_TEST_NAME: tckdb_${{ matrix.gate }}_${{ github.run_id }}_${{ github.run_attempt }}
      AUTH_ALLOW_OPEN_REGISTRATION: "true"
      DEPLOYMENT_MODE: local
      EXPOSE_API_DOCS: "true"
      LEGACY_READS_REQUIRE_AUTH: "false"
      SESSION_COOKIE_SECURE: "false"
      RATE_LIMIT_ENABLED: "false"
      S3_ENDPOINT_URL: http://127.0.0.1:9000
      S3_ACCESS_KEY: tckdb
      S3_SECRET_KEY: tckdb_secret
      S3_BUCKET: tckdb-${{ matrix.gate }}-${{ github.run_id }}-${{ github.run_attempt }}
      S3_REGION: us-east-1

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true
          environment-file: backend/environment.yml
          activate-environment: tckdb_env
          auto-activate-base: false

      - name: Install backend packages
        run: |
          conda run -n tckdb_env python -m pip install --upgrade pip
          conda run -n tckdb_env python -m pip install -e schemas/python/tckdb-schemas
          conda run -n tckdb_env python -m pip install -e "backend[dev]"

      - name: Lint (ruff)
        if: matrix.gate == 'api'
        working-directory: backend
        run: conda run -n tckdb_env ruff check app tests

      - name: Type check (mypy, scoped)
        if: matrix.gate == 'api'
        working-directory: backend
        run: conda run -n tckdb_env mypy

      - name: Hygiene checks
        if: matrix.gate == 'api'
        run: |
          git diff --check
          bash -n backend/scripts/test-fast.sh
          bash -n backend/scripts/test-api.sh
          bash -n backend/scripts/test-scientific.sh
          bash -n backend/scripts/test-full.sh
          bash -n backend/scripts/test-profile.sh
          bash -n backend/scripts/update-openapi-golden.sh
          make help

      - name: Alembic upgrade head
        working-directory: backend
        run: |
          conda run -n tckdb_env alembic upgrade head
          heads_output="$(conda run -n tckdb_env alembic heads)"
          printf '%s\n' "$heads_output"
          test "$(printf '%s\n' "$heads_output" | grep -c '(head)')" -eq 1
          conda run -n tckdb_env alembic current

      - name: Initialize artifact bucket
        run: |
          conda run -n tckdb_env python - <<'PY'
          import os

          import boto3
          from botocore.client import Config
          from botocore.exceptions import ClientError

          bucket = os.environ["S3_BUCKET"]
          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["S3_ENDPOINT_URL"],
              aws_access_key_id=os.environ["S3_ACCESS_KEY"],
              aws_secret_access_key=os.environ["S3_SECRET_KEY"],
              region_name=os.environ["S3_REGION"],
              config=Config(signature_version="s3v4"),
          )

          try:
              s3.head_bucket(Bucket=bucket)
          except ClientError:
              s3.create_bucket(Bucket=bucket)
          PY

      - name: OpenAPI golden snapshot
        if: matrix.gate == 'api'
        working-directory: backend
        run: conda run -n tckdb_env pytest tests/api/test_openapi_snapshot.py -q

      - name: API test gate
        if: matrix.gate == 'api'
        run: >-
          conda run -n tckdb_env bash backend/scripts/test-api.sh
          --ignore=tests/api/scientific/
          --ignore=tests/api/test_openapi_snapshot.py --maxfail=5

      - name: Scientific read and service gate
        if: matrix.gate == 'scientific'
        run: conda run -n tckdb_env bash backend/scripts/test-scientific.sh --maxfail=5

  backend-ci:
    name: Backend CI
    needs: backend-gate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all backend gates to succeed
        env:
          GATE_RESULT: ${{ needs.backend-gate.result }}
        run: test "$GATE_RESULT" = success

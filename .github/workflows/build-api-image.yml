name: build-api-image

# Build the TCKDB API container and push it to Docker Hub
# (docker.io/<DOCKERHUB_USERNAME>/tckdb-api) on every push to main that touches
# the backend, plus on manual dispatch. Credentials come from the repo secrets
# DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub access token, never a
# password). This is the "build + publish" half of CI/CD; the "deploy" half
# (a host pulling the new image, restarting, and running migrations) is
# described in docs/deployment/self_hosting.md and is intentionally NOT
# automated here — it needs a per-deployment decision (webhook / Watchtower /
# scheduled pull) and DB-migration handling.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'schemas/python/**'
      - '.github/workflows/build-api-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # QEMU lets an amd64 runner build the arm64 image via emulation. This is
      # correct but SLOW for a heavy scientific stack. For faster arm64 builds,
      # switch this job to a native arm64 runner (e.g. a self-hosted arm64
      # runner, or GitHub-hosted arm runners) and drop the arm64 QEMU path.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          # Docker Hub is the default registry; log in with the repo secrets.
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tckdb-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # gha cache keeps rebuilds fast (esp. the conda solve/download layer).
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: build-api-image

# Build the TCKDB API container and push it to GitHub Container Registry
# (ghcr.io) on every push to main that touches the backend, plus on manual
# dispatch. This is the "build + publish" half of CI/CD; the "deploy" half
# (a host pulling the new image, restarting, and running migrations) is
# described in docs/deployment/self_hosting.md and is intentionally NOT
# automated here — it needs a per-deployment decision (webhook / Watchtower /
# scheduled pull) and DB-migration handling.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'schemas/python/**'
      - '.github/workflows/build-api-image.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/tckdb-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      # QEMU lets an amd64 runner build the arm64 image via emulation. This is
      # correct but SLOW for a heavy scientific stack. For faster arm64 builds,
      # switch this job to a native arm64 runner (e.g. a self-hosted arm64
      # runner, or GitHub-hosted arm runners) and drop the arm64 QEMU path.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # gha cache keeps rebuilds fast (esp. the conda solve/download layer).
          cache-from: type=gha
          cache-to: type=gha,mode=max

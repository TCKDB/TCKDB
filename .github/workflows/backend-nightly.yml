name: Backend Nightly (full suite)

# The PR-gating workflow (backend-ci.yml) runs only the API and scientific
# tiers for speed. This nightly run executes the complete test suite
# (backend/scripts/test-full.sh, ~4,700 tests) so regressions in the
# untier-gated areas (workflows, invariants, parsers, CLI, importers)
# surface within a day instead of at the next manual pre-push run.

on:
  schedule:
    - cron: "17 2 * * *" # 02:17 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-suite:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      postgres:
        image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
        env:
          POSTGRES_USER: tckdb
          POSTGRES_PASSWORD: tckdb
          POSTGRES_DB: tckdb_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tckdb -d tckdb_test_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        command: server /data --address ":9000"
        env:
          MINIO_ROOT_USER: tckdb
          MINIO_ROOT_PASSWORD: tckdb_secret
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: tckdb
      DB_PASSWORD: tckdb
      DB_NAME: tckdb_test_ci
      DB_CLIENT_ENCODING: utf8
      DB_TEST_NAME: tckdb_test_${{ github.run_id }}_${{ github.run_attempt }}
      AUTH_ALLOW_OPEN_REGISTRATION: "true"
      DEPLOYMENT_MODE: local
      EXPOSE_API_DOCS: "true"
      LEGACY_READS_REQUIRE_AUTH: "false"
      SESSION_COOKIE_SECURE: "false"
      RATE_LIMIT_ENABLED: "false"
      S3_ENDPOINT_URL: http://127.0.0.1:9000
      S3_ACCESS_KEY: tckdb
      S3_SECRET_KEY: tckdb_secret
      S3_BUCKET: tckdb-artifacts-test
      S3_REGION: us-east-1

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true
          environment-file: backend/environment.yml
          activate-environment: tckdb_env
          auto-activate-base: false

      - name: Install backend packages
        run: |
          conda run -n tckdb_env python -m pip install --upgrade pip
          conda run -n tckdb_env python -m pip install -e schemas/python/tckdb-schemas
          conda run -n tckdb_env python -m pip install -e "backend[dev]"

      - name: Initialize artifact bucket
        run: |
          conda run -n tckdb_env python - <<'PY'
          import os

          import boto3
          from botocore.client import Config
          from botocore.exceptions import ClientError

          bucket = os.environ["S3_BUCKET"]
          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["S3_ENDPOINT_URL"],
              aws_access_key_id=os.environ["S3_ACCESS_KEY"],
              aws_secret_access_key=os.environ["S3_SECRET_KEY"],
              region_name=os.environ["S3_REGION"],
              config=Config(signature_version="s3v4"),
          )

          try:
              s3.head_bucket(Bucket=bucket)
          except ClientError:
              s3.create_bucket(Bucket=bucket)
          PY

      - name: Full test suite
        run: conda run -n tckdb_env bash backend/scripts/test-full.sh

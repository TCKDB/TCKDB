name: CodeQL

on:
  pull_request:
    paths:
      - ".github/workflows/codeql.yml"
      - ".github/workflows/**"
      - "backend/**"
      - "clients/python/**"
      - "examples/**"
      - "frontend/**"
      - "integrations/**"
      - "schemas/python/**"
      - "presentation/**"
      - "presentations/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codeql.yml"
      - ".github/workflows/**"
      - "backend/**"
      - "clients/python/**"
      - "examples/**"
      - "frontend/**"
      - "integrations/**"
      - "schemas/python/**"
      - "presentation/**"
      - "presentations/**"
  schedule:
    - cron: "22 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

# ============================================================================
# TCKDB - Raspberry Pi hosted Docker Compose stack
#
# Companion to docs/deployment/raspberry_pi_hosted_deployment.md and
# .env.pi.example.
#
# Topology:
#   * Postgres+RDKit (arm64) and MinIO bind to 127.0.0.1 only. They are
#     reachable from the host's API process via loopback. They are NOT
#     reachable from the LAN or the public internet.
#   * The FastAPI backend runs on the host inside the `tckdb_env` conda
#     env, on 127.0.0.1:8000 (see systemd unit examples in the doc).
#   * `cloudflared` runs as a Compose service and forwards a Cloudflare
#     hostname into 127.0.0.1:8000. The MinIO console (9001) is never
#     published to the tunnel.
#
# Run with:
#   docker compose --env-file .env.pi -f docker-compose.pi.yml up -d
# ============================================================================

services:
  db:
    image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
    # The image publishes linux/arm64; the Pi runs it natively.
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set}
    # Loopback-only publication. NEVER change to "${DB_PORT}:5432" or
    # "0.0.0.0:5432" - that exposes Postgres on the LAN.
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - tckdb_pi_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    # Both the S3 API (9000) and the admin console (9001) are loopback-
    # only. The console is never exposed to the tunnel.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - tckdb_pi_minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Cloudflare Tunnel. The token is provisioned out-of-band via
  # `cloudflared tunnel create` + Cloudflare Zero Trust dashboard and
  # injected as an env var. The tunnel forwards only the public
  # hostname -> 127.0.0.1:8000. Postgres, MinIO, and the MinIO console
  # are not part of any ingress rule.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN must be set}
    # host networking so the tunnel can reach the API on 127.0.0.1:8000
    # without piercing a Docker bridge. On a single-purpose Pi this is
    # the simplest correct posture.
    network_mode: host
    restart: unless-stopped
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  tckdb_pi_pgdata:
  tckdb_pi_minio:
